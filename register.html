<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Wallet Register</title>
    <link rel="stylesheet" href="register.css" />
  </head>

  <body>
    <main class="container">
      <!-- LEFT SIDE -->
      <section class="left">
        <h4 class="logo">
          <img src="assets/dompet1.png" alt="" /><span>E-Wallet</span>
        </h4>

        <h1>
          Start Accessing Banking Needs With All Devices and All Platforms With
          30.000+ Users
        </h1>

        <p class="desc">
          Transfering money is eassier than ever, you can access Zwallet
          wherever you are. Desktop, laptop, mobile phone? we cover all of that
          for you!
        </p>

        <button class="google">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png"
            alt=""
          />Sign In With Google
        </button>
        <button class="facebook">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/1280px-Facebook_f_logo_%282019%29.svg.png"
            alt=""
          />Sign In With Facebook
        </button>

        <div class="or">
          <hr />
          <span>or</span>
          <hr />
        </div>

        <form>
          <label for="e1">Email</label>
          <input type="email" placeholder="Enter Your Email" id="e1" />
          <label for="p1">Password</label>
          <div class="input-container">
            <!-- Ikon Kiri -->
            <img src="assets/Password.png" class="input-icon left-icon" />
            <input type="password" placeholder="Enter Your Password" id="p1" />

            <!-- Ikon Kanan -->
            <img src="assets/EyeSlash.png" class="input-icon right-icon" />
          </div>
          <label for="p2">Confirm Password</label>
          <div class="input-container">
            <!-- Ikon Kiri -->
            <img src="assets/Password.png" class="input-icon left-icon" />

            <input
              type="password"
              placeholder="Enter Your Password Again"
              id="p2"
            />

            <!-- Ikon Kanan -->
            <img src="assets/EyeSlash.png" class="input-icon right-icon" />
          </div>

          <button class="register">Register</button>
        </form>

        <p class="login">Have An Account? <a href="#">Login</a></p>
      </section>

      <!-- RIGHT SIDE -->
      <section class="right">
        <img src="assets/wallet.png" alt="wallet" />
      </section>
    </main>
  </body>
</html>
