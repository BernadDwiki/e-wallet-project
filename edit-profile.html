<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Wallet — Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="edit-profile.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- TOP BAR -->
      <header class="topbar">
        <a href="nav.html" class="topbar-brand">
          <img
            src="assets/dompet1.png"
            alt="E-Wallet Logo"
            class="topbar-brand-logo"
          />
          E-Wallet
        </a>
        <div class="topbar-right">
          <span class="topbar-username">Ghaluh Wizard</span>
          <img
            src="assets/ghaluh.png"
            alt="User Avatar"
            class="topbar-avatar"
          />
          <img src="assets/Vector(2).png" alt="Expand" class="topbar-chevron" />
        </div>
      </header>

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <a href="dashboard.html" class="nav-item">
          <img src="assets/dashboard-two(2).png" alt="" class="nav-icon" />
          Dashboard
        </a>
        <a href="transfer-nominal.html" class="nav-item">
          <img src="assets/Send.png" alt="" class="nav-icon" />
          Transfer
        </a>
        <a href="history.html" class="nav-item">
          <img src="assets/history.png" alt="" class="nav-icon" />
          History
        </a>
        <a href="topup.html" class="nav-item">
          <img src="assets/Upload.png" alt="" class="nav-icon" />
          Top Up
        </a>
        <a href="profile.html" class="nav-item active">
          <img src="assets/2 User.png" alt="" class="nav-icon" />
          Profile
        </a>
        <a href="#" class="nav-item danger">
          <img src="assets/Log Out.png" alt="" class="nav-icon" />
          Keluar
        </a>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- Page Header -->
        <div class="page-header">
          <img src="assets/2 User.png" alt="" class="page-header-icon" />
          <h1 class="page-title">Profile</h1>
        </div>

        <!-- Card -->
        <div class="card">
          <!-- Profile Picture -->
          <div class="section-title">Profile Picture</div>
          <div class="profile-picture-row">
            <div class="avatar-wrap">
              <img src="assets/User.png" alt="Profile" class="avatar-img" />
            </div>
            <div class="avatar-actions">
              <a href="edit-profile-2.html">
                <button class="btn-change">
                  <img src="assets/Edit Square.png" alt="" class="btn-icon" />
                  Change Profile
                </button>
              </a>
              <button class="btn-delete">
                <img src="assets/Delete.png" alt="" class="btn-icon" />
                Delete Profile
              </button>
            </div>
          </div>
          <p class="picture-note">
            The profile picture must be 512 x 512 pixels or less.
          </p>

          <!-- Full Name -->
          <div class="field-group">
            <label class="field-label">Full Name</label>
            <div class="input-wrap">
              <img src="assets/User.png" alt="" class="input-icon" />
              <input
                type="text"
                class="field-input"
                placeholder="Enter Full Name"
              />
            </div>
          </div>

          <!-- Phone -->
          <div class="field-group">
            <label class="field-label">Phone</label>
            <div class="input-wrap">
              <img src="assets/Phone.png" alt="" class="input-icon" />
              <input
                type="tel"
                class="field-input"
                placeholder="Enter Your Number Phone"
              />
            </div>
          </div>

          <!-- Email -->
          <div class="field-group">
            <label class="field-label">Email</label>
            <div class="input-wrap">
              <img src="assets/mail.png" alt="" class="input-icon" />
              <input
                type="email"
                class="field-input"
                placeholder="Enter Your Email"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label">Password</label>
            <a href="change-password.html" class="link-action">Change Password</a>
          </div>

          <!-- Pin -->
          <div class="field-group">
            <label class="field-label">Pin</label>
            <a href="change-pin.html" class="link-action">Change Pin</a>
          </div>

          <!-- Submit -->
          <button class="submit-btn">Submit</button>
        </div>
      </main>
    </div>
  </body>
</html>
