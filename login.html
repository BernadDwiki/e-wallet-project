<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Wallet Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <main class="container">
      <!-- LEFT SIDE -->
      <section class="left">
        <h4 class="logo"><img src="assets/dompet1.png" alt="" />E-Wallet</h4>

        <h1>Hello Welcome Back 👋</h1>

        <p class="desc">
          Fill out the form correctly or you can login with several option.
        </p>

        <button class="google">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png"
            alt=""
          />Sign In With Google
        </button>
        <button class="facebook">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/1280px-Facebook_f_logo_%282019%29.svg.png"
            alt=""
          />Sign In With Facebook
        </button>

        <div class="or">
          <hr />
          <span>or</span>
          <hr />
        </div>

        <form class="input-group">
          <label for="e1">Email</label>
          <input type="email" placeholder="Enter Your Email" id="e1" />
          <label for="p1">Password</label>
          <div class="input-container">
            <!-- Ikon Kiri -->
            <img src="assets/Password.png" class="input-icon left-icon" />
            <input type="password" placeholder="Enter Your Password" id="p1" />

            <!-- Ikon Kanan -->
            <img src="assets/EyeSlash.png" class="input-icon right-icon" />
          </div>

          <button class="register">Login</button>
        </form>

        <p class="login">Not Have An Account? <a href="register.html">Register</a></p>
      </section>

      <!-- RIGHT SIDE -->
      <section class="right">
        <img src="assets/login1.png" alt="" />
      </section>
    </main>
  </body>
</html>
